version: '3.9'

services:

  postgres:
    image: postgres:14
    container_name: evser-postgres
    environment:
      POSTGRES_DB: evser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/procedures.sql:/docker-entrypoint-initdb.d/procedures.sql

  app:
    build: ./app
    container_name: efectivale-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres